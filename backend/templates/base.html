<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Label Maker{% endblock %}</title>
    <style>
        /* Base page rules for cross-engine compatibility (WeasyPrint and xhtml2pdf) */
        @page {
            size: {{ sheet_width|default(210) }}mm {{ sheet_height|default(297) }}mm;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: white;
            color: #111111;
        }
        * {
            box-sizing: border-box;
        }
        
        /* Sheet page divider */
        .sheet {
            width: {{ sheet_width|default(210) }}mm;
            height: {{ sheet_height|default(297) }}mm;
            page-break-after: always;
            position: relative;
            overflow: hidden;
        }
        
        /* Text styling inside labels */
        .label-name {
            font-weight: bold;
            font-size: {{ font_size_name }}pt;
            margin-bottom: 1mm;
            text-transform: uppercase;
            color: #000000;
        }
        
        .label-address {
            font-size: {{ font_size_address }}pt;
            line-height: 1.2;
            color: #111111;
        }
        
        .label-detail {
            font-size: {{ font_size_detail }}pt;
            line-height: 1.1;
            color: #444444;
            margin-top: 1mm;
            padding-top: 0.5mm;
            border-top: 0.1mm dashed #cccccc;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
